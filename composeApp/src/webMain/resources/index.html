<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iago</title>
    <link type="text/css" rel="stylesheet" href="styles.css">
</head>
<body style="text-align: center; align-content: center">
<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 50 50" role="presentation">
    <circle cx="25" cy="25" r="20" stroke="#ccc" stroke-width="4" fill="none"/>
    <circle cx="25" cy="25" r="20" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"
            stroke-dasharray="90 125">
        <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s"
                          repeatCount="indefinite"/>
    </circle>
</svg>
<script>
    (function() {
        // Detectar ambiente automaticamente
        const hostname = window.location.hostname;

        if (hostname === "localhost" || hostname === "127.0.0.1") {
            // Desenvolvimento local
            window.IAGO_BACKEND_URL = "http://localhost:8081";
        } else if (hostname.includes("github.io")) {
            // GitHub Pages - usar backend remoto
            // TODO: Configure a URL do backend remoto quando disponível
            window.IAGO_BACKEND_URL = "http://localhost:8081";
        } else {
            // Outro servidor - tentar localhost primeiro
            window.IAGO_BACKEND_URL = "http://localhost:8081";
        }

        console.log("🤖 IAgo Backend URL:", window.IAGO_BACKEND_URL);
    })();
</script>
<script type="application/javascript" src="composeApp.js"></script>
</body>
</html>
