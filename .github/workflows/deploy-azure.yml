name: Deploy to Azure Container Instances

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ env.REGISTRY }}/${{ github.repository }}/backend:latest
        cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:buildcache
        cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:buildcache,mode=max
    
    - name: Deploy to Azure Container Instances
      uses: azure/container-instances-deploy-action@v1
      with:
        resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
        name: iago-backend
        image: ${{ env.REGISTRY }}/${{ github.repository }}/backend:latest
        cpu: 1
        memory: 1
        registry-login-server: ${{ env.REGISTRY }}
        registry-username: ${{ github.actor }}
        registry-password: ${{ secrets.GITHUB_TOKEN }}
        secure-environment-variables: |
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
        environment-variables: |
          PORT=8080
        dns-name-label: iago-backend-${{ github.run_number }}
        ports: 8080

